<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Synex</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Playfair+Display:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#050507;--bg2:#09090d;--bg3:#0d0d14;--bg4:#12121a;--bg5:#171720;
  --border:rgba(255,255,255,0.06);--border2:rgba(120,120,255,0.25);
  --text:#f0f0f0;--text2:#7a7a90;--text3:#3a3a50;
  --font:'Space Grotesk',sans-serif;--serif:'Playfair Display',serif;--mono:'JetBrains Mono',monospace;
  --c1:#6366f1;--c2:#8b5cf6;--c3:#ec4899;--c4:#06b6d4;--c5:#10b981;
}

/* COLOR SHIFT ANIMATION - like Gemini */
@keyframes colorShift {
  0%   { --shift: #6366f1; background-position: 0% 50%; }
  20%  { background-position: 40% 50%; }
  40%  { background-position: 80% 50%; }
  60%  { background-position: 60% 50%; }
  80%  { background-position: 20% 50%; }
  100% { background-position: 0% 50%; }
}

@keyframes gradientFlow {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.color-shift {
  background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899, #06b6d4, #10b981, #6366f1);
  background-size: 300% 300%;
  animation: gradientFlow 6s ease infinite;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.color-shift-border {
  border-image: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899, #06b6d4) 1;
  animation: gradientFlow 4s ease infinite;
  background-size: 300% 300%;
}

.color-shift-bg {
  background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899, #06b6d4, #10b981, #6366f1);
  background-size: 300% 300%;
  animation: gradientFlow 5s ease infinite;
}

.color-shift-glow {
  animation: glowShift 5s ease infinite;
}
@keyframes glowShift {
  0%   { box-shadow: 0 0 20px rgba(99,102,241,0.4); }
  25%  { box-shadow: 0 0 20px rgba(139,92,246,0.4); }
  50%  { box-shadow: 0 0 20px rgba(236,72,153,0.4); }
  75%  { box-shadow: 0 0 20px rgba(6,182,212,0.4); }
  100% { box-shadow: 0 0 20px rgba(99,102,241,0.4); }
}

@keyframes logoPulse {
  0%,100% { filter: drop-shadow(0 0 12px rgba(99,102,241,0.6)); }
  33%     { filter: drop-shadow(0 0 12px rgba(236,72,153,0.6)); }
  66%     { filter: drop-shadow(0 0 12px rgba(6,182,212,0.6)); }
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden}

/* AMBIENT */
#ambient{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 10% 0%,rgba(99,102,241,0.05) 0%,transparent 60%),
    radial-gradient(ellipse 40% 30% at 90% 100%,rgba(236,72,153,0.04) 0%,transparent 60%),
    radial-gradient(ellipse 30% 20% at 50% 50%,rgba(6,182,212,0.02) 0%,transparent 60%)
}

/* GREETING SCREEN */
#gs{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:40px 20px;transition:opacity .5s ease}
#gs.out{opacity:0;pointer-events:none}
.gs-logo{width:80px;height:80px;border-radius:16px;overflow:hidden;animation:logoPulse 4s ease infinite}
.gs-logo img{width:100%;height:100%;object-fit:cover}
.gs-title{font-family:var(--serif);font-size:32px;font-weight:700;text-align:center;letter-spacing:-0.5px}
.gs-sub{font-size:13px;color:var(--text2);text-align:center;max-width:300px;line-height:1.7}
.gs-field{width:100%;max-width:300px;background:var(--bg4);border:1px solid var(--border2);border-radius:14px;padding:13px 16px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:all .3s}
.gs-field:focus{border-color:transparent;background:var(--bg4);box-shadow:0 0 0 2px #6366f1}
.gs-field::placeholder{color:var(--text3)}
.gs-btn{width:100%;max-width:300px;border:none;border-radius:14px;padding:14px;color:#fff;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.gs-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#6366f1,#8b5cf6,#ec4899,#06b6d4);background-size:300% 300%;animation:gradientFlow 3s ease infinite;z-index:0}
.gs-btn span{position:relative;z-index:1}
.gs-btn:hover{transform:translateY(-1px);opacity:.9}

/* GREETING BAR */
#gb{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;gap:10px;padding:10px 20px;background:rgba(5,5,7,0.9);border-bottom:1px solid rgba(255,255,255,0.06);backdrop-filter:blur(16px);transform:translateY(-100%);transition:transform .4s ease}
#gb.show{transform:translateY(0)}
.gb-logo{width:26px;height:26px;border-radius:6px;overflow:hidden;animation:logoPulse 4s ease infinite}
.gb-logo img{width:100%;height:100%;object-fit:cover}
.gb-txt{font-size:13px;color:var(--text);flex:1}
.gb-x{background:none;border:none;color:var(--text2);cursor:pointer;font-size:18px;padding:0 4px;line-height:1;transition:color .2s}
.gb-x:hover{color:var(--text)}

/* APP */
#app{display:flex;height:100vh;position:relative;z-index:1;transition:padding-top .4s}
#app.baron{padding-top:46px}

/* SIDEBAR */
#sidebar{width:252px;min-width:252px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:transform .3s;position:relative;z-index:10}
.sl-row{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sl-logo{width:30px;height:30px;border-radius:8px;overflow:hidden;flex-shrink:0;animation:logoPulse 4s ease infinite}
.sl-logo img{width:100%;height:100%;object-fit:cover}
.sl-name{font-family:var(--serif);font-size:17px;font-weight:700}
.sl-badge{font-size:9px;border:1px solid rgba(120,120,255,0.3);padding:2px 6px;border-radius:20px;margin-left:auto;letter-spacing:.5px}
.sl-badge,.sl-name{background:linear-gradient(135deg,#6366f1,#8b5cf6,#ec4899);background-size:200%;animation:gradientFlow 5s ease infinite;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.new-btn{margin:10px 10px 4px;background:transparent;border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:var(--font);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;width:calc(100% - 20px);transition:all .2s;position:relative;overflow:hidden}
.new-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#6366f1,#8b5cf6,#ec4899,#06b6d4);background-size:300% 300%;animation:gradientFlow 5s ease infinite;opacity:0;transition:opacity .3s}
.new-btn:hover::before{opacity:0.12}
.new-btn:hover{border-color:rgba(120,120,255,0.3)}
.new-btn span{position:relative;z-index:1}

.mpills{display:flex;gap:5px;padding:6px 10px 8px;flex-wrap:wrap}
.mp{font-size:11px;padding:4px 9px;border-radius:20px;cursor:pointer;border:1px solid var(--border);color:var(--text2);background:transparent;font-family:var(--font);transition:all .2s}
.mp:hover{border-color:rgba(120,120,255,0.3);color:var(--text)}
.mp.on{background:linear-gradient(135deg,rgba(99,102,241,0.15),rgba(139,92,246,0.1));border-color:rgba(99,102,241,0.3);color:#a5b4fc}

.ssec{padding:10px 10px 3px}
.slbl{font-size:10px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;padding:0 8px 7px}
.ni{display:flex;align-items:center;gap:9px;padding:8px 16px;color:var(--text2);font-size:13px;cursor:pointer;border-radius:9px;margin:1px 5px;transition:all .2s;border:1px solid transparent}
.ni:hover{background:var(--bg4);color:var(--text);border-color:var(--border)}
.ni.on{background:linear-gradient(135deg,rgba(99,102,241,0.12),rgba(139,92,246,0.08));color:#a5b4fc;border-color:rgba(99,102,241,0.25)}
.ni-ic{font-size:13px;width:17px;text-align:center}

.hlst{flex:1;overflow-y:auto;padding:3px 6px}
.hlst::-webkit-scrollbar{width:2px}
.hlst::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:2px}
.hi{padding:7px 11px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:12px;transition:all .2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border:1px solid transparent;margin-bottom:1px}
.hi:hover{background:var(--bg4);color:var(--text);border-color:var(--border)}

.sfoot{border-top:1px solid var(--border);padding:10px}
.upill{display:flex;align-items:center;gap:9px;padding:8px 10px;background:var(--bg4);border-radius:9px;border:1px solid var(--border);cursor:pointer;transition:all .2s}
.upill:hover{border-color:rgba(120,120,255,0.25)}
.u-logo{width:26px;height:26px;border-radius:6px;overflow:hidden;flex-shrink:0;animation:logoPulse 4s ease infinite}
.u-logo img{width:100%;height:100%;object-fit:cover}
.uname{font-size:12px;font-weight:500;flex:1}
.uplan{font-size:10px;color:var(--text3)}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#topbar{height:50px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:9px;flex-shrink:0}
.mbtn{background:none;border:1px solid var(--border);border-radius:7px;color:var(--text2);cursor:pointer;padding:5px 8px;font-size:16px;display:none;line-height:1}
.tbtit{font-size:13px;color:var(--text2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ib{background:none;border:1px solid var(--border);border-radius:7px;color:var(--text2);cursor:pointer;padding:5px 9px;font-size:12px;transition:all .2s;font-family:var(--font)}
.ib:hover{border-color:rgba(120,120,255,0.3);color:#a5b4fc;background:rgba(99,102,241,0.08)}

/* VOICE OVERLAY */
#vov{position:fixed;inset:0;z-index:300;background:rgba(5,5,7,0.97);display:none;flex-direction:column;align-items:center;justify-content:center;gap:28px}
#vov.on{display:flex}
.vwrap{position:relative;width:160px;height:160px}
.vring{position:absolute;inset:0;border-radius:50%;border:1px solid rgba(99,102,241,0.3);animation:vp 2s ease-in-out infinite}
.vring:nth-child(2){inset:-18px;animation-delay:.5s;opacity:.5}
.vring:nth-child(3){inset:-36px;animation-delay:1s;opacity:.25}
@keyframes vp{0%,100%{transform:scale(1);opacity:.3}50%{transform:scale(1.05);opacity:.7}}
.vorb{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,0.18) 0%,transparent 70%);display:flex;align-items:center;justify-content:center}
.vlogo{width:76px;height:76px;border-radius:14px;overflow:hidden;animation:logoPulse 3s ease infinite}
.vlogo img{width:100%;height:100%;object-fit:cover}
.vst{font-size:13px;color:var(--text2);letter-spacing:1px}
.vtr{max-width:340px;text-align:center;font-size:15px;color:var(--text);min-height:44px;font-style:italic;padding:0 20px}
.vctrls{display:flex;gap:10px}
.vbtn{background:var(--bg4);border:1px solid var(--border);border-radius:10px;color:var(--text2);cursor:pointer;padding:10px 18px;font-size:13px;font-family:var(--font);transition:all .2s}
.vbtn:hover{border-color:rgba(120,120,255,0.3);color:#a5b4fc}
.vbtn.end{border-color:rgba(239,68,68,0.3);color:#f87171}

/* WAKE */
#wake{position:fixed;bottom:80px;right:14px;z-index:50;background:var(--bg4);border:1px solid var(--border);border-radius:30px;padding:7px 13px;font-size:11px;color:var(--text2);display:flex;align-items:center;gap:6px;cursor:pointer;transition:all .2s}
#wake.on{border-color:rgba(16,185,129,0.35);color:#34d399}
.wdot{width:5px;height:5px;border-radius:50%;background:var(--text3);flex-shrink:0}
#wake.on .wdot{background:#34d399;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* CHAT */
#ca{flex:1;overflow-y:auto;padding:20px 0;display:flex;flex-direction:column}
#ca::-webkit-scrollbar{width:3px}
#ca::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:3px}

/* EMPTY STATE */
#empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px;gap:20px}
.e-logo{width:60px;height:60px;border-radius:14px;overflow:hidden;animation:logoPulse 4s ease infinite}
.e-logo img{width:100%;height:100%;object-fit:cover}
.e-title{font-family:var(--serif);font-size:36px;font-weight:700;text-align:center}
.e-greet{font-size:14px;font-weight:500;text-align:center;min-height:22px}
.e-sub{color:var(--text2);font-size:13px;text-align:center;max-width:360px;line-height:1.7}
.capgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;max-width:460px;width:100%}
.cap{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:13px 14px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.cap::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#6366f1,#8b5cf6,#ec4899,#06b6d4);background-size:300% 300%;animation:gradientFlow 5s ease infinite;opacity:0;transition:opacity .3s}
.cap:hover::before{opacity:.08}
.cap:hover{border-color:rgba(120,120,255,0.25);transform:translateY(-2px)}
.cic{font-size:18px;margin-bottom:5px;position:relative;z-index:1}
.ct{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px;position:relative;z-index:1}
.cd{font-size:11px;color:var(--text2);line-height:1.4;position:relative;z-index:1}

/* MESSAGES */
.mw{padding:5px 18px;max-width:800px;margin:0 auto;width:100%}
.mw.user{display:flex;justify-content:flex-end}
.mw.ai{display:flex;gap:9px}
.mav{width:28px;height:28px;border-radius:7px;overflow:hidden;flex-shrink:0;margin-top:3px;animation:logoPulse 4s ease infinite}
.mav img{width:100%;height:100%;object-fit:cover}
.mb{max-width:78%;padding:11px 15px;border-radius:14px;font-size:14px;line-height:1.75;word-break:break-word}
.mw.user .mb{background:linear-gradient(135deg,rgba(99,102,241,0.18),rgba(139,92,246,0.12));border:1px solid rgba(99,102,241,0.2);border-bottom-right-radius:3px;color:var(--text)}
.mw.ai .mb{background:var(--bg3);border:1px solid var(--border);border-bottom-left-radius:3px;color:var(--text)}
.mm{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap}
.mt{font-size:10px;color:var(--text3)}
.ma{font-size:11px;color:var(--text2);background:none;border:none;cursor:pointer;padding:2px 5px;border-radius:4px;font-family:var(--font);transition:color .15s}
.ma:hover{color:#a5b4fc}
.mb pre{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;overflow-x:auto;margin:8px 0;position:relative}
.mb code{font-family:var(--mono);font-size:12px;color:#a5b4fc}
.mb pre code{color:#c9d1d9}
.mb strong{font-weight:600}
.mb strong,.mb h1,.mb h2,.mb h3{background:linear-gradient(135deg,#6366f1,#8b5cf6,#ec4899);background-size:200%;animation:gradientFlow 5s ease infinite;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.mb em{color:var(--text2)}
.mb ul,.mb ol{padding-left:18px;margin:6px 0}
.mb li{margin-bottom:3px}
.mb p{margin-bottom:6px}
.mb a{color:#a5b4fc;text-decoration:underline}
.ccbtn{position:absolute;top:7px;right:7px;background:var(--bg4);border:1px solid var(--border);border-radius:5px;color:var(--text2);cursor:pointer;padding:2px 7px;font-size:11px;font-family:var(--font);transition:all .2s}
.ccbtn:hover{color:#a5b4fc;border-color:rgba(120,120,255,0.3)}
.tdots{display:flex;gap:4px;padding:3px 0}
.tdots span{width:6px;height:6px;border-radius:50%;animation:bo 1.2s infinite}
.tdots span:nth-child(1){background:#6366f1;animation-delay:0s}
.tdots span:nth-child(2){background:#ec4899;animation-delay:.2s}
.tdots span:nth-child(3){background:#06b6d4;animation-delay:.4s}
@keyframes bo{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

.fp{display:flex;gap:7px;flex-wrap:wrap;padding:7px 18px 0;max-width:800px;margin:0 auto;width:100%}
.fchip{display:flex;align-items:center;gap:6px;background:var(--bg4);border:1px solid var(--border);border-radius:7px;padding:5px 9px;font-size:12px;color:var(--text2)}
.frm{cursor:pointer;color:var(--text2);font-size:15px;line-height:1}
.frm:hover{color:#f87171}

/* INPUT */
#ia{border-top:1px solid var(--border);padding:12px 14px;background:var(--bg2);flex-shrink:0}
#iw{max-width:800px;margin:0 auto;background:var(--bg3);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:all .3s}
#iw:focus-within{border-color:rgba(99,102,241,0.3);box-shadow:0 0 20px rgba(99,102,241,0.06)}
#itb{display:flex;align-items:center;gap:3px;padding:7px 9px 0;flex-wrap:wrap}
.tb{background:none;border:1px solid transparent;border-radius:6px;color:var(--text2);cursor:pointer;padding:4px 7px;font-size:12px;font-family:var(--font);transition:all .2s;white-space:nowrap;line-height:1.4}
.tb:hover{color:#a5b4fc;background:rgba(99,102,241,0.08);border-color:rgba(99,102,241,0.2)}
.tb.act{color:#fbbf24;border-color:rgba(251,191,36,0.3)}
#msgin{width:100%;background:none;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:14px;resize:none;padding:9px 13px;min-height:48px;max-height:140px;line-height:1.6;overflow-y:auto;display:block}
#msgin::placeholder{color:var(--text3)}
#inf{display:flex;align-items:center;gap:7px;padding:5px 11px 9px}
.cc{font-size:11px;color:var(--text3);flex:1}
.mbadge{font-size:10px;color:var(--text3);border:1px solid var(--border);padding:3px 8px;border-radius:20px;white-space:nowrap}
#sbtn{border:none;border-radius:9px;color:#fff;cursor:pointer;width:34px;height:34px;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;line-height:1;position:relative;overflow:hidden}
#sbtn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#6366f1,#8b5cf6,#ec4899,#06b6d4);background-size:300% 300%;animation:gradientFlow 3s ease infinite}
#sbtn span{position:relative;z-index:1}
#sbtn:hover{transform:scale(1.07)}

/* PANELS */
.pov{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;padding:20px}
.pov.on{display:flex}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:18px;max-width:490px;width:100%;max-height:85vh;overflow-y:auto;padding:22px}
.panel::-webkit-scrollbar{width:2px}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.pt{font-family:var(--serif);font-size:18px}
.pcl{background:none;border:1px solid var(--border);border-radius:7px;color:var(--text2);cursor:pointer;padding:5px 9px;font-size:14px;transition:all .2s;line-height:1}
.pcl:hover{border-color:rgba(239,68,68,0.4);color:#f87171}
.sr{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);gap:12px}
.sr:last-child{border-bottom:none}
.sl{font-size:13px;font-weight:500}
.sd{font-size:11px;color:var(--text2);margin-top:2px}
.tog{width:38px;height:21px;border-radius:11px;background:var(--bg5);border:1px solid var(--border);position:relative;cursor:pointer;transition:all .3s;flex-shrink:0}
.tog.on{border-color:rgba(99,102,241,0.4);background:linear-gradient(135deg,#6366f1,#8b5cf6)}
.tog::after{content:'';position:absolute;width:15px;height:15px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left .3s;box-shadow:0 1px 4px rgba(0,0,0,0.3)}
.tog.on::after{left:20px}
.sel{background:var(--bg4);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--font);font-size:12px;padding:5px 9px;outline:none;cursor:pointer}
.sel:focus{border-color:rgba(99,102,241,0.4)}
.ebtn{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:11px 14px;color:var(--text);font-family:var(--font);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:9px;transition:all .2s;margin-bottom:7px;text-align:left}
